# ── Load local .env file (optional — safe to omit in production) ───────────
spring.config.import=optional:file:.env[.properties]

server.port=${PORT:8080}
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT — falls back to a stable dev secret if JWT_SECRET env var is not set.
# ALWAYS override JWT_SECRET with your own value in production.
jwt.secret=${JWT_SECRET:dG9rZW5zZWNyZXRmb3Jkb29tcGxhdGZvcm1kZXZlbG9wbWVudHVzZW9ubHlub3Rmb3Jwcm9kdWN0aW9uMTIzNDU2Nzg=}
jwt.expiration=86400000

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:4173}
logging.level.com.doomplatform=INFO
logging.level.org.springframework.security=WARN
